name: Docker Image CI (Save as Artifact)

on:
  push:
    tags:
      - 'v*'                     # 仍然在打标签时触发，你也可以根据需要修改触发条件

env:
  IMAGE_NAME: songling/joiask4dfzz       # 镜像名称，可自定义

jobs:
  build-and-save:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}}
          type=raw,value=latest

    - name: Build and export to Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true                # 关键：将镜像加载到本地 Docker 守护进程，而不是推送到远程
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Save Docker image to tar file
      run: |
        # 获取生成的 tags 列表（可能包含多个，例如 "xinrea/joiask:1.2.3" 和 "xinrea/joiask:latest"）
        # 我们将第一个 tag 作为文件名的基础，保存为 tar 文件
        FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
        # 替换斜杠和冒号为下划线，生成合法文件名
        FILENAME=$(echo "$FIRST_TAG" | sed 's/[\/:]/_/g').tar
        echo "Saving image $FIRST_TAG as $FILENAME"
        docker save -o "$FILENAME" "$FIRST_TAG"
        echo "saved_image=$FILENAME" >> $GITHUB_ENV

    - name: Upload image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: ${{ env.saved_image }}
